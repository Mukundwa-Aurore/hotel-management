# Server Configuration
server.port=8080

# Database Configuration - Use file-based H2 database for persistence across restarts
spring.datasource.url=jdbc:h2:file:./data/hotelmanagement;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA/Hibernate Configuration
# Use 'update' so schema is updated without dropping data on restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configuration
app.jwt.secret=${JWT_SECRET:myMukundwaAuroreSecretCodeForTesting123456789}
app.jwt.expiration=86400000

